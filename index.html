<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battery Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #222;
    --text: #f0f0f0; --muted: #666;
    --faulty: #ff2d2d; --faulty-bg: #1a0000; --faulty-glow: rgba(255,45,45,0.3);
    --ok: #00e676; --ok-bg: #001a0a; --ok-glow: rgba(0,230,118,0.3);
    --accent: #ffffff;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .header-title { font-size: 13px; font-weight: bold; letter-spacing: .15em; text-transform: uppercase; }
  .header-count { font-size: 11px; color: var(--muted); letter-spacing: .08em; }
  .content { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 14px; }

  .scanner-wrap { position: relative; width: 100%; aspect-ratio: 1; max-width: 400px; margin: 0 auto; border-radius: 4px; overflow: hidden; background: #000; border: 1px solid var(--border); }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }

  .scan-overlay { position: absolute; inset: 0; pointer-events: none; }
  .scan-corner { position: absolute; width: 28px; height: 28px; border-color: var(--accent); border-style: solid; border-width: 0; }
  .scan-corner.tl { top:20px;left:20px;border-top-width:2px;border-left-width:2px; }
  .scan-corner.tr { top:20px;right:20px;border-top-width:2px;border-right-width:2px; }
  .scan-corner.bl { bottom:20px;left:20px;border-bottom-width:2px;border-left-width:2px; }
  .scan-corner.br { bottom:20px;right:20px;border-bottom-width:2px;border-right-width:2px; }
  .scan-line { position:absolute;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);top:20px;animation:scan-sweep 2.5s ease-in-out infinite;opacity:.6; }
  @keyframes scan-sweep { 0%{top:20px} 100%{top:calc(100% - 20px)} }

  .result-flash { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none;z-index:10; }
  .result-flash.show { opacity:1; }
  .result-flash.faulty { background:rgba(26,0,0,.9); }
  .result-flash.ok { background:rgba(0,26,10,.9); }
  .flash-icon { font-size:60px;line-height:1;margin-bottom:8px; }
  .flash-label { font-size:24px;font-weight:bold;letter-spacing:.2em;text-transform:uppercase; }
  .flash-label.faulty { color:var(--faulty); }
  .flash-label.ok { color:var(--ok); }

  .idle-overlay { position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20; }
  .idle-overlay.hidden { display:none; }
  .start-btn { background:var(--accent);color:#000;border:none;padding:14px 36px;font-family:'Courier New',monospace;font-size:14px;font-weight:bold;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;border-radius:2px; }

  .status-bar { font-size:11px;color:var(--muted);text-align:center;letter-spacing:.08em;min-height:16px;padding:0 8px; }
  .status-bar.error { color: #ff6b6b; }

  .result-card { border-radius:4px;padding:14px 16px;border:1px solid var(--border);background:var(--surface);display:none; }
  .result-card.visible { display:block; }
  .result-card.faulty { border-color:var(--faulty);background:var(--faulty-bg);box-shadow:0 0 20px var(--faulty-glow); }
  .result-card.ok { border-color:var(--ok);background:var(--ok-bg);box-shadow:0 0 20px var(--ok-glow); }
  .result-status { font-size:18px;font-weight:bold;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px; }
  .result-status.faulty { color:var(--faulty); }
  .result-status.ok { color:var(--ok); }
  .result-serial { font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:4px; }
  .result-time { font-size:10px;color:#444; }

  .stats-bar { display:flex;gap:8px; }
  .stat { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:10px 12px;text-align:center; }
  .stat-value { font-size:22px;font-weight:bold;line-height:1;margin-bottom:3px; }
  .stat-value.faulty { color:var(--faulty); }
  .stat-value.ok { color:var(--ok); }
  .stat-value.total { color:var(--text); }
  .stat-label { font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted); }

  .section-label { font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#333;margin-bottom:6px; }
  .manual-wrap { display:flex;gap:8px; }
  .manual-input { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:9px 12px;outline:none; }
  .manual-input:focus { border-color:var(--accent); }
  .manual-input::placeholder { color:#333; }
  .btn-check { font-family:'Courier New',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border-radius:2px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#000;font-weight:bold;white-space:nowrap; }

  .log-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
  .log-title { font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted); }
  .log-actions { display:flex;gap:8px; }
  .btn-sm { font-family:'Courier New',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:2px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted); }
  .btn-sm.export { border-color:var(--ok);color:var(--ok); }

  .log-list { display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto; }
  .log-item { display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:2px;background:var(--surface);border-left:2px solid transparent;font-size:11px; }
  .log-item.faulty { border-left-color:var(--faulty); }
  .log-item.ok { border-left-color:var(--ok); }
  .log-badge { font-size:9px;font-weight:bold;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;border-radius:2px;flex-shrink:0; }
  .log-badge.faulty { background:var(--faulty-bg);color:var(--faulty);border:1px solid var(--faulty); }
  .log-badge.ok { background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok); }
  .log-serial { flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .log-time { color:#444;flex-shrink:0;font-size:10px; }
  .log-empty { text-align:center;color:#333;font-size:11px;letter-spacing:.1em;padding:24px 0; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <span class="header-title">Battery Scanner</span>
  </div>
  <span class="header-count" id="faultyCount">351 faulty serials</span>
</div>

<div class="content">
  <div class="scanner-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="scan-overlay">
      <div class="scan-corner tl"></div><div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div><div class="scan-corner br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="result-flash" id="resultFlash">
      <div class="flash-icon" id="flashIcon"></div>
      <div class="flash-label" id="flashLabel"></div>
    </div>
    <div class="idle-overlay" id="idleOverlay">
      <button class="start-btn" onclick="startCamera()">START SCANNING</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">Tap Start Scanning to begin</div>

  <div class="result-card" id="resultCard">
    <div class="result-status" id="resultStatus"></div>
    <div class="result-serial" id="resultSerial"></div>
    <div class="result-time" id="resultTime"></div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-value total" id="statTotal">0</div><div class="stat-label">Scanned</div></div>
    <div class="stat"><div class="stat-value faulty" id="statFaulty">0</div><div class="stat-label">Faulty</div></div>
    <div class="stat"><div class="stat-value ok" id="statOk">0</div><div class="stat-label">OK</div></div>
  </div>

  <div>
    <div class="section-label">Manual check</div>
    <div class="manual-wrap">
      <input class="manual-input" id="manualInput" type="text" placeholder="Type or paste serial number" />
      <button class="btn-check" onclick="checkManual()">Check</button>
    </div>
  </div>

  <div>
    <div class="log-header">
      <span class="log-title">Session log</span>
      <div class="log-actions">
        <button class="btn-sm" onclick="clearLog()">Clear</button>
        <button class="btn-sm export" onclick="exportLog()">Export CSV</button>
      </div>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty" id="logEmpty">No scans yet</div>
    </div>
  </div>
</div>

<!-- jsQR as reliable iOS fallback -->

let sessionLog = [];
let cooldown = false;
let scanning = false;
let animFrame = null;
let detector = null;
let useNative = false;

// ── INIT ──────────────────────────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('idleOverlay').classList.add('hidden');
  setStatus('Starting camera...');

  // Check which scanning engine to use
  if ('BarcodeDetector' in window) {
    try {
      detector = new BarcodeDetector({ formats: ['qr_code'] });
      useNative = true;
      setStatus('Camera active — point at QR code');
    } catch(e) {
      useNative = false;
    }
  }

  if (!useNative && typeof jsQR === 'undefined') {
    setStatus('Loading scanner...', false);
    // Wait for jsQR to load
    await new Promise(resolve => setTimeout(resolve, 1000));
  }

  try {
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    scanning = true;
    setStatus('Camera active — point at QR code');
    requestAnimationFrame(tick);
  } catch(e) {
    setStatus('Camera error: ' + e.message, true);
    document.getElementById('idleOverlay').classList.remove('hidden');
  }
}

// ── SCAN LOOP ─────────────────────────────────────────────────────────────────
async function tick() {
  if (!scanning) return;
  const video = document.getElementById('video');

  if (video.readyState >= 2 && !cooldown) {
    try {
      if (useNative && detector) {
        // Native BarcodeDetector (Android Chrome, some iOS 17+)
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          handleScan(codes[0].rawValue.trim());
        }
      } else if (typeof jsQR !== 'undefined') {
        // jsQR fallback (iOS Safari)
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'attemptBoth'
        });
        if (code) {
          handleScan(code.data.trim());
        }
      }
    } catch(e) {
      // silent — keep scanning
    }
  }

  animFrame = requestAnimationFrame(tick);
}

// ── HANDLE RESULT ─────────────────────────────────────────────────────────────
function handleScan(serial) {
  cooldown = true;
  const status = FAULTY_SERIALS.has(serial) ? 'faulty' : 'ok';
  showResult(serial, status);
  addToLog(serial, status);
  updateStats();
  if (navigator.vibrate) navigator.vibrate(status === 'faulty' ? [100,50,100] : [80]);
  setTimeout(() => {
    cooldown = false;
    document.getElementById('resultFlash').classList.remove('show');
  }, 2500);
}

function showResult(serial, status) {
  const flash = document.getElementById('resultFlash');
  flash.className = `result-flash show ${status}`;
  document.getElementById('flashIcon').textContent = status === 'faulty' ? '✗' : '✓';
  const fl = document.getElementById('flashLabel');
  fl.textContent = status === 'faulty' ? 'FAULTY' : 'OK';
  fl.className = `flash-label ${status}`;

  const card = document.getElementById('resultCard');
  card.className = `result-card visible ${status}`;
  const rs = document.getElementById('resultStatus');
  rs.className = `result-status ${status}`;
  rs.textContent = status === 'faulty' ? '✗ FAULTY — DO NOT USE' : '✓ OK — GOOD BATTERY';
  document.getElementById('resultSerial').textContent = serial;
  document.getElementById('resultTime').textContent = new Date().toLocaleTimeString();
}

function addToLog(serial, status) {
  const entry = { serial, status, time: new Date().toLocaleTimeString() };
  sessionLog.unshift(entry);
  document.getElementById('logEmpty').style.display = 'none';
  const item = document.createElement('div');
  item.className = `log-item ${status}`;
  item.innerHTML = `<span class="log-badge ${status}">${status==='faulty'?'FAULTY':'OK'}</span><span class="log-serial">${serial}</span><span class="log-time">${entry.time}</span>`;
  const list = document.getElementById('logList');
  list.insertBefore(item, list.firstChild);
}

function updateStats() {
  document.getElementById('statTotal').textContent = sessionLog.length;
  document.getElementById('statFaulty').textContent = sessionLog.filter(e=>e.status==='faulty').length;
  document.getElementById('statOk').textContent = sessionLog.filter(e=>e.status==='ok').length;
}

function setStatus(msg, isError) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar' + (isError ? ' error' : '');
}

function checkManual() {
  const input = document.getElementById('manualInput');
  const serial = input.value.trim();
  if (!serial) return;
  const status = FAULTY_SERIALS.has(serial) ? 'faulty' : 'ok';
  showResult(serial, status);
  addToLog(serial, status);
  updateStats();
  input.value = '';
}

document.getElementById('manualInput').addEventListener('keydown', e => { if (e.key==='Enter') checkManual(); });

function clearLog() {
  sessionLog = [];
  document.getElementById('logList').innerHTML = '<div class="log-empty" id="logEmpty">No scans yet</div>';
  updateStats();
  document.getElementById('resultCard').classList.remove('visible');
}

function exportLog() {
  if (!sessionLog.length) { alert('No scans to export.'); return; }
  const rows = ['Serial,Status,Time', ...sessionLog.map(e=>`${e.serial},${e.status},${e.time}`)];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `battery-scan-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
